<!--
  LiraFlow — Giriş Sayfası
  Kullanıcı adı ve şifre ile oturum açılır.
  Form gönderimi: static/js/giris.page.js
-->
<!DOCTYPE html>
<html class="light" lang="tr">
<head>
  <!-- Karakter seti ve mobil uyum -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>LiraFlow | Giriş</title>

  <!-- Stil: Tailwind CSS (CDN) + Google Fonts -->
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script src="/static/js/tailwind.theme.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap" rel="stylesheet" />
  <link href="/static/style.css?v=2" rel="stylesheet" />
</head>

<body class="bg-[#f8f9ff] min-h-screen flex items-center justify-center p-6">

  <!-- Giriş kartı (ortada beyaz kutu) -->
  <div class="w-full max-w-md bg-white rounded-2xl border border-gray-200 shadow-lg p-8">

    <!-- Logo ve başlık -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-[#6ffbbe] text-[#091426] font-bold text-xl flex items-center justify-center">
        LF
      </div>
      <h1 class="text-2xl font-bold text-[#091426] mb-1">LiraFlow</h1>
      <p class="text-gray-500">Nakit akışı yönetim paneli</p>
    </div>

    <!-- Giriş formu — id="giris-form" JavaScript tarafından dinlenir -->
    <form id="giris-form" class="space-y-4">

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1" for="kullanici-adi">
          Kullanıcı Adı
        </label>
        <input
          id="kullanici-adi"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-[#091426] focus:border-[#091426] outline-none"
          type="text"
          autocomplete="username"
          placeholder="Kullanıcı adınız"
          required
        />
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1" for="sifre">
          Şifre
        </label>
        <input
          id="sifre"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-[#091426] focus:border-[#091426] outline-none"
          type="password"
          autocomplete="current-password"
          placeholder="••••••••"
          required
        />
      </div>

      <!-- Hata mesajı — başta gizli, JS ile gösterilir -->
      <p id="giris-hata" class="text-sm text-red-600 hidden"></p>

      <button
        type="submit"
        id="giris-btn"
        class="w-full bg-[#091426] text-white py-3 rounded-xl font-semibold hover:opacity-90 transition-opacity flex items-center justify-center gap-2"
      >
        <span class="material-symbols-outlined text-md">login</span>
        Giriş Yap
      </button>

    </form>
  </div>

  <!-- Sayfa JavaScript dosyaları (sıra önemli) -->
  <script src="/static/js/apiService.js"></script>
  <script src="/static/js/authService.js"></script>
  <script src="/static/js/giris.page.js"></script>

</body>
</html>
