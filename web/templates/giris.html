<!DOCTYPE html>
<html class="light" lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LiraFlow | Giriş</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap" rel="stylesheet"/>
<style>
body { font-family: Inter, sans-serif; }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-[#f8f9ff] min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-md bg-white rounded-2xl border border-gray-200 shadow-lg p-8">
<div class="text-center mb-8">
<div class="w-16 h-16 mx-auto mb-4 rounded-full bg-[#6ffbbe] text-[#091426] font-bold text-xl flex items-center justify-center">LF</div>
<h1 class="text-2xl font-bold text-[#091426] mb-1">LiraFlow</h1>
<p class="text-gray-500">Nakit akışı yönetim paneli</p>
</div>
<form id="giris-form" class="space-y-4">
<div>
<label class="block text-sm font-semibold text-gray-700 mb-1" for="kullanici-adi">Kullanıcı Adı</label>
<input id="kullanici-adi" class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-[#091426] focus:border-[#091426] outline-none" type="text" autocomplete="username" placeholder="Kullanıcı adınız" required/>
</div>
<div>
<label class="block text-sm font-semibold text-gray-700 mb-1" for="sifre">Şifre</label>
<input id="sifre" class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-[#091426] focus:border-[#091426] outline-none" type="password" autocomplete="current-password" placeholder="••••••••" required/>
</div>
<p id="giris-hata" class="text-sm text-red-600 hidden"></p>
<button type="submit" id="giris-btn" class="w-full bg-[#091426] text-white py-3 rounded-xl font-semibold hover:opacity-90 transition-opacity flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-md">login</span>
Giriş Yap
</button>
</form>
</div>
<script src="/static/js/apiService.js"></script>
<script src="/static/js/authService.js"></script>
<script src="/static/js/giris.page.js"></script>
</body>
</html>
