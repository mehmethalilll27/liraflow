<!DOCTYPE html>
<html class="light" lang="tr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LiraFlow | Harcamalar</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = { darkMode: "class", theme: { extend: { colors: { primary: "#091426", "on-primary": "#ffffff", secondary: "#006c49", error: "#ba1a1a", background: "#f8f9ff", "on-surface": "#0b1c30", "on-surface-variant": "#45474c", "surface-container-lowest": "#ffffff", "outline-variant": "#c5c6cd", "secondary-container": "#6cf8bb", "error-container": "#ffdad6" } } } };
</script>
<style>
body { font-family: 'Inter', sans-serif; }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
.sidebar-active { background-color: rgba(211, 228, 254, 0.1); border-left: 4px solid #6ffbbe; color: #ffffff; font-weight: 700; }
</style>
</head>
<body class="bg-background text-on-surface antialiased overflow-hidden">
<aside class="fixed left-0 top-0 h-full w-[280px] bg-primary flex flex-col py-6 shadow-md z-50">
<div class="px-6 mb-8">
<h1 class="text-2xl font-bold text-white">LiraFlow</h1>
<p class="text-xs text-white/70 uppercase tracking-wider">Adjust Verileri</p>
</div>
<nav class="flex-1 px-2 space-y-1">
<a class="flex items-center gap-3 px-6 py-3 text-white/70 hover:text-white hover:bg-white/5" href="/"><span class="material-symbols-outlined">dashboard</span><span class="text-xs font-semibold uppercase">Panel</span></a>
<a class="flex items-center gap-3 px-6 py-3 text-white/70 hover:text-white hover:bg-white/5" href="/firmalar"><span class="material-symbols-outlined">business</span><span class="text-xs font-semibold uppercase">Partnerler</span></a>
<a class="flex items-center gap-3 px-6 py-3 sidebar-active" href="/harcamalar"><span class="material-symbols-outlined">payments</span><span class="text-xs font-semibold uppercase">Harcamalar</span></a>
</nav>
</aside>
<header class="fixed top-0 right-0 w-[calc(100%-280px)] h-16 bg-white border-b border-outline-variant flex justify-between items-center px-8 z-40">
<h2 class="text-lg font-semibold">Adjust Harcamaları</h2>
<button type="button" id="sync-btn" class="flex items-center gap-2 bg-primary text-white px-4 py-2 rounded-xl text-sm font-semibold hover:opacity-90">
<span class="material-symbols-outlined text-lg">sync</span> Senkronize Et
</button>
</header>
<main class="ml-[280px] mt-16 p-8 h-[calc(100vh-64px)] overflow-y-auto">
<div class="max-w-6xl mx-auto">
<div class="flex flex-wrap gap-2 mb-6" id="filtre-bar">
<button type="button" class="px-4 py-2 rounded-full text-sm font-semibold bg-primary text-white" data-gun="30">30 Gün</button>
<button type="button" class="px-4 py-2 rounded-full text-sm font-semibold border border-outline-variant" data-gun="60">60 Gün</button>
<button type="button" class="px-4 py-2 rounded-full text-sm font-semibold border border-outline-variant" data-gun="90">90 Gün</button>
<button type="button" class="px-4 py-2 rounded-full text-sm font-semibold border border-outline-variant" data-yon="">Tümü</button>
<button type="button" class="px-4 py-2 rounded-full text-sm font-semibold border border-outline-variant" data-yon="GIDER">Gider</button>
<button type="button" class="px-4 py-2 rounded-full text-sm font-semibold border border-outline-variant" data-yon="GELIR">Gelir</button>
</div>
<p class="text-sm text-on-surface-variant mb-4" id="sync-durum">-</p>
<div class="bg-white rounded-xl border border-outline-variant overflow-hidden shadow-sm">
<table class="w-full text-left">
<thead>
<tr class="bg-gray-50 border-b border-outline-variant text-xs uppercase text-on-surface-variant">
<th class="px-6 py-4">Tarih</th>
<th class="px-6 py-4">Partner</th>
<th class="px-6 py-4">Kampanya</th>
<th class="px-6 py-4">Yön</th>
<th class="px-6 py-4 text-right">Tutar</th>
</tr>
</thead>
<tbody id="hareket-body" class="divide-y divide-outline-variant/50 text-sm"></tbody>
</table>
</div>
</div>
</main>
<script src="/static/js/utils.js?v=3"></script>
<script src="/static/js/apiService.js?v=3"></script>
<script src="/static/js/authService.js?v=3"></script>
<script src="/static/js/adjustService.js?v=1"></script>
<script src="/static/js/harcamalar.page.js?v=1"></script>
</body>
</html>
