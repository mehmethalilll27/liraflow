<!--
  LiraFlow — Harcamalar Sayfası
  Adjust'tan gelen hareketler tablo halinde listelenir.
  Filtreler ve senkron butonu: static/js/harcamalar.page.js
-->
<!DOCTYPE html>
<html class="light" lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>LiraFlow | Harcamalar</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link href="/static/style.css?v=2" rel="stylesheet" />

  <script src="/static/js/tailwind.theme.js"></script>

</head>

<body class="bg-background text-on-background antialiased overflow-hidden">

  <!-- ========== SOL MENÜ (panel ile aynı tasarım) ========== -->
  <aside class="fixed left-0 top-0 h-full w-[280px] bg-primary flex flex-col py-lg shadow-md z-50">
    <div class="px-lg mb-xl">
      <h1 class="font-headline-lg text-headline-lg font-bold text-on-primary">LiraFlow</h1>
      <p class="font-label-md text-label-md text-secondary-fixed/70">Nakit Akışı Yönetimi</p>
    </div>

    <nav class="flex-1 space-y-xs px-md">
      <a class="flex items-center gap-md px-md py-sm rounded-lg text-on-primary-container hover:text-on-primary hover:bg-primary-container/50 transition-colors duration-200" href="/">
        <span class="material-symbols-outlined">dashboard</span>
        <span class="font-label-md text-label-md">Panel</span>
      </a>
      <a class="flex items-center gap-md px-md py-sm rounded-lg text-on-primary-container hover:text-on-primary hover:bg-primary-container/50 transition-colors duration-200" href="/firmalar">
        <span class="material-symbols-outlined">business</span>
        <span class="font-label-md text-label-md">Partnerler</span>
      </a>
      <a class="flex items-center gap-md px-md py-sm rounded-lg bg-surface-container-highest/10 border-l-4 border-secondary-fixed text-on-primary font-bold transition-all duration-200" href="/harcamalar">
        <span class="material-symbols-outlined">payments</span>
        <span class="font-label-md text-label-md">Harcamalar</span>
      </a>
    </nav>
  </aside>

  <!-- ========== ÜST ÇUBUK ========== -->
  <header class="fixed top-0 right-0 w-[calc(100%-280px)] h-16 bg-surface border-b border-outline-variant flex justify-between items-center px-xl z-40">
    <h2 class="font-headline-md text-headline-md text-on-surface">Adjust Harcamaları</h2>

    <button
      type="button"
      id="sync-btn"
      class="flex items-center gap-2 bg-secondary text-on-secondary px-lg py-sm rounded-xl font-label-md hover:opacity-90 transition-opacity"
    >
      <span class="material-symbols-outlined text-lg">sync</span>
      Senkronize Et
    </button>
  </header>

  <!-- ANA İÇERİK -->
  <main class="ml-[280px] mt-16 p-xl h-[calc(100vh-64px)] overflow-y-auto">
    <div class="max-w-6xl mx-auto">

      <!-- Filtre butonları — data-gun ve data-yon JS tarafından okunur -->
      <div class="flex flex-wrap gap-2 mb-6" id="filtre-bar">
        <button type="button" class="px-4 py-2 rounded-full text-sm font-semibold bg-primary text-white" data-gun="30">30 Gün</button>
        <button type="button" class="px-4 py-2 rounded-full text-sm font-semibold border border-outline-variant" data-gun="60">60 Gün</button>
        <button type="button" class="px-4 py-2 rounded-full text-sm font-semibold border border-outline-variant" data-gun="90">90 Gün</button>
        <button type="button" class="px-4 py-2 rounded-full text-sm font-semibold border border-outline-variant" data-yon="">Tümü</button>
        <button type="button" class="px-4 py-2 rounded-full text-sm font-semibold border border-outline-variant" data-yon="GIDER">Gider</button>
        <button type="button" class="px-4 py-2 rounded-full text-sm font-semibold border border-outline-variant" data-yon="GELIR">Gelir</button>
      </div>

      <!-- Son senkron durumu metni -->
      <p class="text-sm text-on-surface-variant mb-4" id="sync-durum">-</p>

      <!-- Hareket tablosu — satırlar JS ile tbody'ye eklenir -->
      <div class="bg-surface-container-lowest rounded-xl border border-outline-variant overflow-hidden shadow-sm">
        <table class="w-full text-left">
          <thead>
            <tr class="bg-gray-50 border-b border-outline-variant text-xs uppercase text-on-surface-variant">
              <th class="px-6 py-4">Tarih</th>
              <th class="px-6 py-4">Partner</th>
              <th class="px-6 py-4">Kampanya</th>
              <th class="px-6 py-4">Yön</th>
              <th class="px-6 py-4 text-right">Tutar</th>
            </tr>
          </thead>
          <tbody id="hareket-body" class="divide-y divide-outline-variant/50 text-sm">
            <!-- JavaScript buraya satır ekler -->
          </tbody>
        </table>
      </div>

    </div>
  </main>

  <script src="/static/js/utils.js?v=3"></script>
  <script src="/static/js/apiService.js?v=3"></script>
  <script src="/static/js/authService.js?v=3"></script>
  <script src="/static/js/adjustService.js?v=1"></script>
  <script src="/static/js/harcamalar.page.js?v=1"></script>

</body>
</html>
